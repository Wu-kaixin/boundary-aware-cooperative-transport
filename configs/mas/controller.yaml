controller:
  type: dtransport
  robot_mode: free

input:
  state_timeout_ms: 500
  require_all_tracked_for_valid_state: false

recording:
  enable: true
  output_dir: data/experiments

plot:
  enable_after_experiment: true
  plot_trajectory: true
  plot_pose_time_series: true
  plot_command_time_series: true
  save_every_n_frames: 20

# Copy this file to MAS-public/configs/controllers/dtransport.yaml
# This config is intentionally conservative for real robots.
hold_enabled: false

sensor_range: 0.70
comm_range: 1.30
cage_offset: 0.30
sigma: 0.28
map_ttl: 3.0

d_min: 0.42
max_speed: 0.18
max_wz: 0.60
kp_explore: 0.15
kp_cage: 0.55
kp_transport: 0.08
grid_resolution: 24
cbf_gamma: 5.0

# Lab debug option: use a known polygon until object perception is implemented.
# Coordinates are in MAS world frame.
virtual_object:
  enabled: false
  id: cargo_0
  vertices:
    - [1.0, 1.0]
    - [1.7, 1.0]
    - [1.7, 1.5]
    - [1.0, 1.5]
  transport_direction: [1.0, 0.0]
